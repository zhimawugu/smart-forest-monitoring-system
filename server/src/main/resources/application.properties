# Spring Boot Application Configuration

# Server Port (for Spring Boot web, if needed)
server.port=8080

# gRPC Server Configuration
grpc.server.port=50051

# mDNS service discovery for gRPC
mdns.enabled=true
mdns.service.type=_forest-grpc._tcp.local.
mdns.service.name=forest-grpc-server
mdns.service.description=Smart Forest gRPC Server

# Logging Configuration
logging.level.root=INFO
logging.level.com.nci.forest.server=DEBUG
logging.level.net.devh.boot.grpc=INFO

# Application Name
spring.application.name=forest-monitoring-server

