# Spring Boot Application Configuration

# Server Port (for Spring Boot web, if needed)
server.port=8080

# gRPC Server Configuration
grpc.server.port=50051

# jmDNS service discovery for gRPC
jmdns.service.type=_forest-grpc._tcp.local.
jmdns.service.name=forest-grpc-server
jmdns.service.description=Smart Forest gRPC Server

# Logging Configuration
logging.level.root=INFO

# Application Name
spring.application.name=forest-monitoring-server

