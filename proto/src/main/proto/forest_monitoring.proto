syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.nci.forest.proto";
option java_outer_classname = "ForestMonitoringProto";

package forestmonitoring;

// Forest Monitoring Service
service ForestMonitoringService {
  // Simple greeting RPC
  rpc SayHello(HelloRequest) returns (HelloResponse);
}

// Hello request
message HelloRequest {
  string name = 1;
}

// Hello response
message HelloResponse {
  string message = 1;
}


